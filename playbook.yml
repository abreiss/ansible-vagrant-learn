---
- name: Install GitHub Actions self-hosted runner
  hosts: all
  become: true
  vars:
    runner_version: "2.333.1"
    runner_user: runner
    runner_dir: /home/runner/actions-runner
    runner_name: ec2-runner
    runner_labels: ec2
    # To enable download verification, pass via extra vars:
    # -e runner_checksum="sha256:<hash>"
    # Hashes are listed at: https://github.com/actions/runner/releases/tag/v{{ runner_version }}

  handlers:
    - name: Restart runner service
      ansible.builtin.systemd:
        name: "{{ runner_service_file.content | b64decode | trim }}"
        state: restarted
        daemon_reload: true

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - libicu70
          - acl
        state: present
        update_cache: true

    - name: Create runner user
      ansible.builtin.user:
        name: "{{ runner_user }}"
        shell: /bin/bash
        create_home: true

    - name: Create runner directory
      ansible.builtin.file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Download runner package
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: /tmp/actions-runner.tar.gz
        checksum: "{{ runner_checksum | default(omit) }}"

    - name: Extract runner package
      ansible.builtin.unarchive:
        src: /tmp/actions-runner.tar.gz
        dest: "{{ runner_dir }}"
        remote_src: true
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        creates: "{{ runner_dir }}/run.sh"
      notify: Restart runner service

    - name: Configure runner
      ansible.builtin.command: >
        ./config.sh
        --url https://github.com/{{ github_repo }}
        --token {{ runner_token }}
        --unattended
        --name {{ runner_name }}
        --labels {{ runner_labels }}
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.runner"
      become_user: "{{ runner_user }}"
      no_log: true

    - name: Install runner service
      ansible.builtin.command: ./svc.sh install {{ runner_user }}
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.service"

    - name: Read runner service name
      ansible.builtin.slurp:
        src: "{{ runner_dir }}/.service"
      register: runner_service_file

    - name: Start and enable runner service
      ansible.builtin.systemd:
        name: "{{ runner_service_file.content | b64decode | trim }}"
        state: started
        enabled: true
        daemon_reload: true
