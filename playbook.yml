---
- name: Provision EC2 instance
  hosts: localhost
  gather_facts: false
  vars:
    aws_region: us-east-1
    instance_type: t2.micro
    key_name: github-runner-key
    security_group_name: github-runner-sg
    instance_name: github-runner
    github_repo: "abreiss/ansible-vagrant-learn"

  tasks:
    - name: Generate SSH key pair
      command: ssh-keygen -t rsa -b 4096 -f ./{{ key_name }} -N ""
      args:
        creates: "./{{ key_name }}"

    - name: Import public key to AWS
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        key_material: "{{ lookup('file', './' + key_name + '.pub') }}"
        region: "{{ aws_region }}"

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: Security group for GitHub Actions runner
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: 0.0.0.0/0
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0

    - name: Get latest Ubuntu 22.04 x86_64 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: ["099720109477"]
        filters:
          name: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*"
          architecture: x86_64
          state: available
      register: ubuntu_amis

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ (ubuntu_amis.images | sort(attribute='creation_date') | last).image_id }}"
        key_name: "{{ key_name }}"
        security_groups: ["{{ security_group_name }}"]
        state: running
        wait: true
        tags:
          Name: "{{ instance_name }}"
      register: ec2

    - name: Add EC2 instance to dynamic inventory
      add_host:
        hostname: "{{ ec2.instances[0].public_ip_address }}"
        groups: ec2_runners
        ansible_user: ubuntu
        ansible_ssh_private_key_file: "./{{ key_name }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

    - name: Wait for SSH to become available
      wait_for:
        host: "{{ ec2.instances[0].public_ip_address }}"
        port: 22
        delay: 10
        timeout: 120


- name: Install GitHub Actions self-hosted runner
  hosts: ec2_runners
  become: true
  vars:
    runner_version: "2.333.1"
    runner_user: runner
    runner_dir: /home/runner/actions-runner
    github_repo: "abreiss/ansible-vagrant-learn"

  handlers:
    - name: Restart runner service
      systemd:
        name: "{{ runner_service_name.stdout }}"
        state: restarted
        daemon_reload: true

  tasks:
    - name: Install dependencies
      apt:
        name:
          - curl
          - tar
          - libicu70
          - acl
        state: present
        update_cache: true

    - name: Create runner user
      user:
        name: "{{ runner_user }}"
        shell: /bin/bash
        create_home: true

    - name: Create runner directory
      file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Download runner package
      get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: /tmp/actions-runner.tar.gz

    - name: Extract runner package
      unarchive:
        src: /tmp/actions-runner.tar.gz
        dest: "{{ runner_dir }}"
        remote_src: true
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        creates: "{{ runner_dir }}/run.sh"
      notify: Restart runner service

    - name: Configure runner
      command: >
        ./config.sh
        --url https://github.com/{{ github_repo }}
        --token {{ runner_token }}
        --unattended
        --name ec2-runner
        --labels ec2
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.runner"
      become_user: "{{ runner_user }}"

    - name: Install runner service
      command: ./svc.sh install {{ runner_user }}
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.service"

    - name: Read runner service name
      command: cat "{{ runner_dir }}/.service"
      register: runner_service_name
      changed_when: false

    - name: Start and enable runner service
      systemd:
        name: "{{ runner_service_name.stdout }}"
        state: started
        enabled: true
        daemon_reload: true
