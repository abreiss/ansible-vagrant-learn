---
- name: Install GitHub Actions self-hosted runner
  hosts: all
  become: yes
  vars:
    runner_version: "2.333.1"
    runner_user: "runner"
    runner_dir: "/home/runner/actions-runner"
    github_repo: "abreiss/ansible-vagrant-learn"

  handlers:
    - name: Restart runner service
      systemd:
        name: "{{ runner_service_name.stdout }}"
        state: restarted
        daemon_reload: yes

  tasks:
    - name: Install dependencies
      apt:
        name:
          - curl
          - tar
          - libicu-dev
          - acl
        state: present
        update_cache: yes

    - name: Create runner user
      user:
        name: "{{ runner_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create runner directory
      file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Download runner package
      get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-arm64-{{ runner_version }}.tar.gz"
        dest: "/tmp/actions-runner.tar.gz"

    - name: Extract runner package
      unarchive:
        src: "/tmp/actions-runner.tar.gz"
        dest: "{{ runner_dir }}"
        remote_src: yes
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        creates: "{{ runner_dir }}/run.sh"
      notify: Restart runner service

    - name: Configure runner
      command: >
        ./config.sh
        --url https://github.com/{{ github_repo }}
        --token {{ runner_token }}
        --unattended
        --name vagrant-runner
        --labels vagrant
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.runner"
      become_user: "{{ runner_user }}"

    - name: Install runner service
      command: ./svc.sh install {{ runner_user }}
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.service"

    - name: Read runner service name
      command: cat "{{ runner_dir }}/.service"
      register: runner_service_name
      changed_when: false

    - name: Start and enable runner service
      systemd:
        name: "{{ runner_service_name.stdout }}"
        state: started
        enabled: yes
        daemon_reload: yes
