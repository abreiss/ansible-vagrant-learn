name: Test Self-Hosted Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, ec2]
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          echo "Hello from self-hosted runner!"
          uname -a
          whoami
          hostname
