name: Provision EC2 Runner

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::963275461108:role/github-actions-runner
          aws-region: us-east-1

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f github-runner-key -N ""
          chmod 600 github-runner-key

      - name: Install Ansible
        run: pip install ansible

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: |
          SSH_KEY_PATH="$(realpath ../github-runner-key)"
          terraform apply -auto-approve \
            -var="ssh_public_key=$(cat ../github-runner-key.pub)" \
            -var="ssh_private_key_path=${SSH_KEY_PATH}" \
            -var="runner_token=${{ secrets.RUNNER_TOKEN }}"
